name: Auto Convert Memory to PR

on:
  push:
    paths:
      - '1_memory/conversations/**/*.md' # 只监听新增对话摘要的变动
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  create-pr-from-memory:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      # 此处留出位置供日后安装依赖，例如 pip install requests 等
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip

      # 运行你的 Python 脚本来生成 PR 逻辑
      # 实际开发中，这个脚本需要调用 GitHub API (使用 ${{ secrets.GITHUB_TOKEN }}) 
      - name: Run PR Generation Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python 5_scripts/generate_pr.py